<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ENCONTRÁ LA PAREJA</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  /* ====== RESET & BASE ====== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FEF6E8;
    --bg-alt: #FFF0D4;
    --fg: #3D2C1E;
    --fg-light: #7A6655;
    --accent: #FF6B35;
    --accent-hover: #E85D2C;
    --accent2: #00B894;
    --accent2-hover: #00A381;
    --gold: #FDCB6E;
    --error: #E74C3C;
    --card-bg: #FFFFFF;
    --card-border: #F0E0CC;
    --hud-bg: rgba(255,255,255,0.92);
    --shadow: 0 4px 20px rgba(61,44,30,0.1);
    --radius: 16px;
    --radius-sm: 10px;
  }
  html { font-size: 18px; }
  body {
    font-family: 'Fredoka', sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    overflow-x: hidden;
    text-transform: uppercase;
    -webkit-tap-highlight-color: transparent;
  }

  /* ====== FONDO ANIMADO ====== */
  #bg-shapes {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .bg-shape {
    position: absolute;
    opacity: 0.08;
    animation: floatShape linear infinite;
  }
  @keyframes floatShape {
    0% { transform: translateY(0) rotate(0deg) scale(1); }
    33% { transform: translateY(-25px) rotate(120deg) scale(1.05); }
    66% { transform: translateY(15px) rotate(240deg) scale(0.95); }
    100% { transform: translateY(0) rotate(360deg) scale(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .bg-shape { animation: none !important; }
    .card-inner { transition: none !important; }
  }

  /* ====== PANTALLAS ====== */
  .screen {
    display: none;
    position: relative;
    z-index: 1;
    min-height: 100vh;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .container { width: 100%; max-width: 680px; padding: 24px 20px; }

  /* ====== TÍTULO ====== */
  .game-title {
    font-size: clamp(2rem, 6vw, 3.2rem);
    font-weight: 700;
    text-align: center;
    margin: 20px 0 6px;
    background: linear-gradient(135deg, var(--accent), #FF9F43, var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }
  .game-subtitle {
    text-align: center;
    color: var(--fg-light);
    font-size: 0.95rem;
    font-weight: 400;
    margin-bottom: 28px;
  }

  /* ====== FORMULARIO ====== */
  .form-group { margin-bottom: 22px; text-align: center; }
  .form-label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--fg-light);
    margin-bottom: 8px;
    letter-spacing: 0.05em;
  }
  .form-input {
    width: 100%;
    max-width: 360px;
    padding: 14px 20px;
    border: 2.5px solid var(--card-border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--fg);
    background: var(--card-bg);
    text-transform: uppercase;
    text-align: center;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(255,107,53,0.15);
  }
  .form-input::placeholder { color: #C4B5A4; font-weight: 400; }

  /* Selector personalizado */
  .custom-pairs-selector {
    margin-top: 12px;
    padding: 12px;
    background: rgba(255,255,255,0.6);
    border-radius: var(--radius-sm);
    border: 1px solid var(--card-border);
    text-align: center;
  }
  .form-label-small {
    display: block;
    font-size: 0.8rem;
    font-weight: 500;
    color: var(--fg-light);
    margin-bottom: 6px;
    letter-spacing: 0.05em;
  }
  .form-input-small {
    width: 100%;
    max-width: 120px;
    padding: 8px 12px;
    border: 2px solid var(--card-border);
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 500;
    color: var(--fg);
    background: var(--card-bg);
    text-align: center;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input-small:focus {
    border-color: var(--accent);
  }

  /* ====== ZONA DE CARGA ====== */
  .drop-zone {
    border: 3px dashed var(--card-border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    background: rgba(255,255,255,0.5);
    margin-bottom: 16px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: rgba(255,107,53,0.05);
  }
  .drop-zone i { font-size: 2.2rem; color: var(--accent); margin-bottom: 8px; }
  .drop-zone p { font-size: 0.95rem; color: var(--fg-light); font-weight: 500; }
  .drop-zone .small { font-size: 0.78rem; color: #B5A694; margin-top: 4px; }

  /* ====== PREVIEW DE IMÁGENES ====== */
  .preview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
    margin-bottom: 22px;
  }
  .preview-item {
    position: relative;
    border-radius: var(--radius-sm);
    overflow: hidden;
    border: 2px solid var(--card-border);
    background: var(--card-bg);
    aspect-ratio: 1;
  }
  .preview-item img {
    width: 100%; height: 100%; object-fit: cover;
  }
  .preview-item .preview-name {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(61,44,30,0.75);
    color: #FFF;
    font-size: 0.6rem;
    font-weight: 600;
    padding: 2px 4px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-item .remove-btn {
    position: absolute; top: 3px; right: 3px;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    background: var(--error);
    color: #FFF;
    font-size: 0.6rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.8;
    transition: opacity 0.2s, transform 0.2s;
  }
  .preview-item .remove-btn:hover { opacity: 1; transform: scale(1.15); }

  /* ====== DIFICULTAD ====== */
  .diff-buttons {
    display: flex; gap: 10px; justify-content: center;
    flex-wrap: wrap;
  }
  .diff-btn {
    flex: 1; min-width: 120px; max-width: 180px;
    padding: 14px 10px;
    border: 2.5px solid var(--card-border);
    border-radius: var(--radius-sm);
    background: var(--card-bg);
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    color: var(--fg);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    line-height: 1.3;
  }
  .diff-btn small { display: block; font-size: 0.7rem; font-weight: 400; color: var(--fg-light); margin-top: 2px; }
  .diff-btn:hover { border-color: var(--accent); }
  .diff-btn.active {
    border-color: var(--accent);
    background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(253,203,110,0.15));
    color: var(--accent);
  }

  /* ====== BOTONES PRINCIPALES ====== */
  .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 24px; align-items: center; }
  .btn-primary, .btn-secondary {
    width: 100%; max-width: 400px;
    padding: 16px 24px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 1.05rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #FF9F43);
    color: #FFF;
    box-shadow: 0 4px 15px rgba(255,107,53,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,53,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .btn-secondary {
    background: var(--card-bg);
    color: var(--accent);
    border: 2.5px solid var(--accent);
  }
  .btn-secondary:hover { background: rgba(255,107,53,0.06); }
  .btn-small {
    padding: 10px 20px;
    font-size: 0.85rem;
    max-width: 240px;
  }

  /* ====== HUD ====== */
  #hud {
    width: 100%;
    max-width: 660px;
    background: var(--hud-bg);
    backdrop-filter: blur(10px);
    border-radius: var(--radius);
    padding: 12px 16px;
    margin: 12px auto 8px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 14px;
    justify-content: center;
    align-items: center;
    box-shadow: var(--shadow);
    z-index: 5;
    position: relative;
  }
  .hud-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.8rem;
    font-weight: 500;
    white-space: nowrap;
  }
  .hud-item i { font-size: 0.85rem; }
  .hud-item .hud-val { font-weight: 700; color: var(--accent); }
  .hud-item.streak .hud-val { color: var(--error); }
  .hud-item.pairs .hud-val { color: var(--accent2); }

  /* ====== TABLERO ====== */
  #board-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 8px;
  }
  #board {
    display: grid;
    gap: 8px;
    width: 100%;
    max-width: 600px;
    padding: 16px;
    background: rgba(255,255,255,0.4);
    border-radius: var(--radius);
    backdrop-filter: blur(5px);
    /* Layout dinámico - se configura desde JS */
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(auto-fit, 1fr);
  }

  /* ====== CARTAS ====== */
  .card {
    perspective: 800px;
    cursor: pointer;
    aspect-ratio: 3/4;
    -webkit-user-select: none;
    user-select: none;
  }
  .card-inner {
    width: 100%; height: 100%;
    transition: transform 0.5s ease;
    transform-style: preserve-3d;
    position: relative;
    border-radius: var(--radius-sm);
  }
  .card:not(.flipped):not(.matched):not(.locked):hover .card-inner {
    transform: scale(1.04);
  }
  .card:not(.flipped):not(.matched):not(.locked):active .card-inner {
    transform: scale(0.96);
  }
  .card.flipped .card-inner,
  .card.matched .card-inner {
    transform: rotateY(180deg);
  }
  .card-face {
    position: absolute;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: var(--radius-sm);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card-back {
    background: linear-gradient(145deg, var(--accent), #FF9F43, var(--gold));
    box-shadow: 0 3px 12px rgba(255,107,53,0.2);
    border: 2.5px solid rgba(255,255,255,0.3);
  }
  .card-back i {
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: rgba(255,255,255,0.45);
  }
  .card-front {
    transform: rotateY(180deg);
    background: var(--card-bg);
    border: 2.5px solid var(--card-border);
    flex-direction: column;
    padding: 6px;
  }
  .card-front img {
    width: 100%; height: 100%;
    object-fit: contain;
    border-radius: 6px;
  }
  .card-front .card-text {
    font-size: clamp(0.75rem, 2.2vw, 1.1rem);
    font-weight: 700;
    color: var(--fg);
    text-align: center;
    word-break: break-word;
    line-height: 1.1;
    padding: 4px;
    max-height: 100%;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  /* Efectos de carta */
  .card.matched .card-front {
    border-color: var(--accent2);
    box-shadow: 0 0 18px rgba(0,184,148,0.35);
    animation: matchGlow 2s ease-in-out infinite;
  }
  @keyframes matchGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(0,184,148,0.25); }
    50% { box-shadow: 0 0 22px rgba(0,184,148,0.4); }
  }
  .card.error .card-inner {
    animation: shakeCard 0.4s ease;
  }
  @keyframes shakeCard {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    20% { transform: rotateY(180deg) translateX(-6px); }
    40% { transform: rotateY(180deg) translateX(6px); }
    60% { transform: rotateY(180deg) translateX(-4px); }
    80% { transform: rotateY(180deg) translateX(4px); }
  }
  .card.locked { pointer-events: none; }

  /* ====== OVERLAY SILABAS ====== */
  #syllable-overlay {
    position: fixed; inset: 0;
    background: rgba(61,44,30,0.55);
    backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
    animation: fadeIn 0.25s ease;
  }
  #syllable-overlay.show { display: flex; }
  .syllable-box {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 30px 40px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    max-width: 90vw;
  }
  .syllable-word {
    font-size: clamp(2rem, 8vw, 3.5rem);
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 10px;
    line-height: 1.2;
  }
  .syllable-syllables {
    font-size: clamp(1.2rem, 4vw, 1.8rem);
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 0.1em;
  }

  /* ====== PANTALLA FIN ====== */
  .end-container {
    text-align: center;
    padding: 30px 20px;
  }
  .end-title {
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .end-stars { font-size: 3rem; margin-bottom: 16px; }
  .end-stars .fa-star { margin: 0 4px; color: #DDD; transition: color 0.3s, transform 0.3s; }
  .end-stars .fa-star.earned { color: var(--gold); transform: scale(1.15); }
  .end-score {
    font-size: clamp(2.5rem, 10vw, 4rem);
    font-weight: 700;
    color: var(--fg);
    line-height: 1;
    margin-bottom: 6px;
  }
  .end-score-label {
    font-size: 0.85rem;
    color: var(--fg-light);
    margin-bottom: 20px;
  }
  .end-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 400px;
    margin: 0 auto 20px;
  }
  .end-stat {
    background: rgba(255,255,255,0.7);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
  }
  .end-stat-val { font-size: 1.3rem; font-weight: 700; color: var(--accent); }
  .end-stat-label { font-size: 0.65rem; color: var(--fg-light); margin-top: 2px; }
  .end-message {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 24px;
    color: var(--accent2);
  }

  /* ====== MODAL RANKING ====== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(61,44,30,0.5);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 15px 50px rgba(0,0,0,0.2);
    animation: fadeIn 0.3s ease;
  }
  .modal-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--accent);
    text-align: center;
    margin-bottom: 16px;
  }
  .ranking-list { list-style: none; }
  .ranking-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    background: var(--bg);
    font-size: 0.82rem;
  }
  .ranking-item:first-child { background: linear-gradient(135deg, rgba(253,203,110,0.2), rgba(255,107,53,0.1)); }
  .ranking-pos {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--card-border);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 0.75rem;
    flex-shrink: 0;
  }
  .ranking-item:first-child .ranking-pos { background: var(--gold); color: var(--fg); }
  .ranking-name { flex: 1; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ranking-score { font-weight: 700; color: var(--accent); }
  .ranking-date { font-size: 0.65rem; color: var(--fg-light); }
  .ranking-empty { text-align: center; color: var(--fg-light); padding: 30px; font-size: 0.9rem; }
  .modal-close {
    display: block;
    margin: 16px auto 0;
    padding: 10px 30px;
    border: 2px solid var(--card-border);
    border-radius: var(--radius-sm);
    background: none;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--fg-light);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .modal-close:hover { border-color: var(--accent); color: var(--accent); }

  /* ====== BOTÓN MUTE ====== */
  #btn-mute {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2.5px solid var(--card-border);
    background: var(--hud-bg);
    backdrop-filter: blur(8px);
    color: var(--fg);
    font-size: 1.1rem;
    cursor: pointer;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    box-shadow: var(--shadow);
  }
  #btn-mute:hover { border-color: var(--accent); color: var(--accent); }
  #btn-mute.muted { color: var(--error); border-color: var(--error); }

  /* ====== TOAST ====== */
  #toast-container {
    position: fixed;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
    pointer-events: none;
  }
  .toast {
    padding: 12px 24px;
    border-radius: var(--radius-sm);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    color: #FFF;
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    pointer-events: auto;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast-error { background: var(--error); }
  .toast-success { background: var(--accent2); }
  .toast-info { background: var(--accent); }

  /* ====== CONFETTI CANVAS ====== */
  #confetti-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 150;
  }

  /* ====== BOTÓN RANKING EN INICIO ====== */
  .link-btn {
    background: none;
    border: none;
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--fg-light);
    cursor: pointer;
    text-transform: uppercase;
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-top: 16px;
    transition: color 0.2s;
  }
  .link-btn:hover { color: var(--accent); }

  /* ====== SEPARADOR ====== */
  .or-divider {
    text-align: center;
    color: var(--fg-light);
    font-size: 0.8rem;
    font-weight: 500;
    margin: 4px 0;
    position: relative;
  }
  .or-divider::before, .or-divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 30%;
    height: 1.5px;
    background: var(--card-border);
  }
  .or-divider::before { left: 0; }
  .or-divider::after { right: 0; }

  /* ====== RESPONSIVE ====== */
  @media (max-width: 600px) {
    #board { gap: 6px; padding: 10px; max-width: 420px; }
    #hud { padding: 8px 10px; gap: 4px 10px; margin: 8px 6px 4px; }
    .hud-item { font-size: 0.72rem; }
    .end-stats { grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .container { padding: 16px 14px; }
    .btn-primary, .btn-secondary { padding: 14px 18px; font-size: 0.95rem; }
    .diff-buttons { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  }
  @media (max-width: 380px) {
    #board { gap: 4px; padding: 6px; max-width: 320px; }
    .card-front .card-text { font-size: 0.7rem; }
    .card-back i { font-size: 1rem; }

<script>
/* ============================================================
   CONFIGURACIÓN Y DATOS POR DEFECTO
   ============================================================ */
const DIFFICULTY_MAP = {
  easy:   { pairs: 8, cols: 4, rows: 4 },
  medium: { pairs: 12, cols: 4, rows: 6 },
  hard:   { pairs: 16, cols: 4, rows: 8 },
  custom: { pairs: 8, cols: 4, rows: 4 } // Valor por defecto para custom
};

// Pares por defecto con silabas predefinidas
const DEFAULT_PAIRS = [
  { name: 'GATO',      emoji: '🐱', syllables: 'GA-TO' },
  { name: 'PERRO',     emoji: '🐶', syllables: 'PER-RO' },
  { name: 'SOL',       emoji: '☀️', syllables: 'SOL' },
  { name: 'LUNA',      emoji: '🌙', syllables: 'LU-NA' },
  { name: 'FLOR',      emoji: '🌸', syllables: 'FLOR' },
  { name: 'ÁRBOL',     emoji: '🌳', syllables: 'ÁR-BOL' },
  { name: 'PESCADO',   emoji: '🐟', syllables: 'PES-CA-DO' },
  { name: 'ESTRELLA',  emoji: '⭐', syllables: 'ES-TRE-LLA' },
  { name: 'CASA',      emoji: '🏠', syllables: 'CA-SA' },
  { name: 'CORAZÓN',   emoji: '❤️', syllables: 'CO-RA-ZÓN' },
  { name: 'MARIPOSA',  emoji: '🦋', syllables: 'MA-RI-PO-SA' },
  { name: 'LEÓN',      emoji: '🦁', syllables: 'LE-ÓN' }
];

/* ============================================================
   ESTADO DEL JUEGO
   ============================================================ */
let state = {
  screen: 'INIT',
  playerName: '',
  difficulty: 'easy',
  pairs: [],           // { pairId, name, imageUrl, syllables }
  cards: [],           // { id, type, pairId, value, imageUrl, matched, revealed }
  flippedCards: [],
  score: 0,
  pairsFound: 0,
  totalPairs: 0,
  attempts: 0,
  errors: 0,
  streak: 0,
  bestStreak: 0,
  firstAttempt: true,  // true si aún no erró en la racha actual
  timerStart: 0,
  timerInterval: null,
  elapsedSeconds: 0,
  locked: false,
  muted: false,
  useCustom: false
};

// Imágenes cargadas por el usuario
let uploadedImages = []; // { name, imageUrl }

/* ============================================================
   MANEJADOR DE SONIDOS (WEB AUDIO API)
   ============================================================ */
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, duration, type = 'sine', volume = 0.15, delay = 0) {
  if (state.muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
    gain.gain.setValueAtTime(volume, ctx.currentTime + delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + delay);
    osc.stop(ctx.currentTime + delay + duration);
  } catch(e) { /* silenciar errores de audio */ }
}

const SFX = {
  flip() {
    playTone(800, 0.08, 'sine', 0.1);
    playTone(1200, 0.06, 'sine', 0.06, 0.03);
  },
  match() {
    playTone(523, 0.15, 'sine', 0.15);
    playTone(659, 0.15, 'sine', 0.15, 0.12);
    playTone(784, 0.25, 'sine', 0.18, 0.24);
  },
  error() {
    playTone(300, 0.2, 'triangle', 0.1);
    playTone(220, 0.3, 'triangle', 0.08, 0.15);
  },
  victory() {
    const notes = [523, 587, 659, 784, 880, 1047];
    notes.forEach((n, i) => playTone(n, 0.2, 'sine', 0.12, i * 0.12));
  }
};

/* ============================================================
   SÍNTESIS DE VOZ
   ============================================================ */
function speakWord(word) {
  if (state.muted) return;
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(word);
  utt.lang = 'es-ES';
  utt.rate = 0.8;
  utt.pitch = 1.15;
  utt.volume = 0.9;
  window.speechSynthesis.speak(utt);
}

/* ============================================================
   SEPARACIÓN SILÁBICA (BÁSICO PARA ESPAÑOL)
   ============================================================ */
function separateSyllables(word) {
  // Buscar silabas predefinidas primero
  const def = DEFAULT_PAIRS.find(p => p.name === word);
  if (def) return def.syllables;

  const vowels = 'AEIOUÁÉÍÓÚÜ';
  const strongVowels = 'AEOÁÉÓÚ';
  const weakVowels = 'IUÍÚÜ';
  let syllables = [];
  let i = 0;

  while (i < word.length) {
    let syl = '';

    // Consonante inicial
    while (i < word.length && !vowels.includes(word[i])) {
      syl += word[i];
      i++;
    }

    if (i >= word.length) { if (syl) syllables.push(syl); break; }

    // Primera vocal
    syl += word[i];
    i++;

    // Segunda vocal (diptongo/triptongo)
    if (i < word.length && vowels.includes(word[i])) {
      const prev = syl[syl.length - 1];
      const curr = word[i];
      // Si la anterior es débil y la actual fuerte → nueva sílaba
      if (weakVowels.includes(prev) && strongVowels.includes(curr)) {
        syllables.push(syl);
        syl = '';
      }
      syl += word[i];
      i++;
      // Tercera vocal
      if (i < word.length && vowels.includes(word[i]) && weakVowels.includes(word[i - 1])) {
        syl += word[i];
        i++;
      }
    }

    // Consonante intermedia
    if (i < word.length && !vowels.includes(word[i])) {
      const c1 = word[i];
      // Ver si la próxima consonante forma grupo
      if (i + 1 < word.length && !vowels.includes(word[i + 1])) {
        const c2 = word[i + 1];
        const groups = ['BL','BR','CL','CR','DR','FL','FR','GL','GR','PL','PR','TR','CH','LL','RR'];
        if (groups.includes(c1 + c2)) {
          // Grupo consonántico: va con la siguiente sílaba
          syllables.push(syl);
          syl = '';
          syl += c1 + c2;
          i += 2;
        } else {
          // Dos consonantes que no forman grupo: primera va con sílaba actual
          syl += c1;
          i++;
        }
      } else {
        syl += c1;
        i++;
      }
    }

    if (syl) syllables.push(syl);
  }

  return syllables.join('-') || word;
}

/* ============================================================
   GENERADOR DE IMÁGENES EMOJI (CANVAS)
   ============================================================ */
function createEmojiImageUrl(emoji) {
  const c = document.createElement('canvas');
  c.width = 240; c.height = 240;
  const ctx = c.getContext('2d');
  // Fondo redondeado
  ctx.fillStyle = '#FFF8F0';
  ctx.beginPath();
  ctx.roundRect(0, 0, 240, 240, 24);
  ctx.fill();
  // Emoji
  ctx.font = '140px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, 120, 125);
  return c.toDataURL('image/png');
}

// Precargar imágenes emoji
const emojiImageCache = {};
DEFAULT_PAIRS.forEach(p => {
  emojiImageCache[p.name] = createEmojiImageUrl(p.emoji);
});

/* ============================================================
   SISTEMA DE TOAST
   ============================================================ */
function showToast(msg, type = 'info') {
  const container = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  container.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 300);
  }, 2800);
}

/* ============================================================
   FONDO ANIMADO
   ============================================================ */
function createBackgroundShapes() {
  const container = document.getElementById('bg-shapes');
  const colors = ['#FF6B35','#00B894','#FDCB6E','#E74C3C','#FF9FF3','#54A0FF'];
  for (let i = 0; i < 14; i++) {
    const s = document.createElement('div');
    s.className = 'bg-shape';
    const size = 50 + Math.random() * 140;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      background:${colors[i % colors.length]};
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      animation-duration:${10 + Math.random()*14}s;
      animation-delay:${-Math.random()*12}s;
      border-radius:${Math.random()>0.5 ? '50%' : '35%'};
    `;
    container.appendChild(s);
  }
}

/* ============================================================
   NAVEGACIÓN DE PANTALLAS
   ============================================================ */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ============================================================
   CARGA DE IMÁGENES
   ============================================================ */
function handleFiles(files) {
  const validExts = ['jpg','jpeg','png','webp'];
  Array.from(files).forEach(file => {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!validExts.includes(ext)) return;

    const name = file.name.replace(/\.[^.]+$/, '').toUpperCase().trim();
    if (!name) return;

    // Verificar duplicados
    if (uploadedImages.some(u => u.name === name)) {
      showToast(`"${name}" YA ESTÁ CARGADO`, 'error');
      return;
    }

    const imageUrl = URL.createObjectURL(file);
    uploadedImages.push({ name, imageUrl });
  });
  renderPreviews();
}

function removeImage(index) {
  URL.revokeObjectURL(uploadedImages[index].imageUrl);
  uploadedImages.splice(index, 1);
  renderPreviews();
}

function renderPreviews() {
  const grid = document.getElementById('preview-grid');
  grid.innerHTML = '';
  uploadedImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `
      <img src="${img.imageUrl}" alt="${img.name}">
      <div class="preview-name">${img.name}</div>
      <button class="remove-btn" data-index="${i}" aria-label="Quitar"><i class="fas fa-xmark"></i></button>
    `;
    grid.appendChild(div);
  });
  // Eventos de quitar
  grid.querySelectorAll('.remove-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      removeImage(parseInt(btn.dataset.index));
    });
  });
}

/* ============================================================
   GENERACIÓN DE CARTAS
   ============================================================ */
function generateCards(pairs) {
  const cards = [];
  let id = 0;
  pairs.forEach(p => {
    // Carta imagen
    cards.push({
      id: id++,
      type: 'image',
      pairId: p.name,
      value: p.name,
      imageUrl: p.imageUrl,
      syllables: p.syllables || separateSyllables(p.name),
      matched: false,
      revealed: false
    });
    // Carta texto
    cards.push({
      id: id++,
      type: 'text',
      pairId: p.name,
      value: p.name,
      imageUrl: null,
      syllables: p.syllables || separateSyllables(p.name),
      matched: false,
      revealed: false
    });
  });
  // Mezclar (Fisher-Yates)
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  return cards;
}

/* ============================================================
   UTILIDADES DE LAYOUT
   ============================================================ */
function calculateOptimalLayout(totalCards) {
  // Calcular layout óptimo para mantener proporciones razonables
  // Priorizar más columnas que filas para mejor UX en móviles

  if (totalCards <= 8) {
    return { cols: 4, rows: Math.ceil(totalCards / 4) };
  } else if (totalCards <= 16) {
    return { cols: 4, rows: Math.ceil(totalCards / 4) };
  } else if (totalCards <= 24) {
    return { cols: 6, rows: Math.ceil(totalCards / 6) };
  } else {
    return { cols: 8, rows: Math.ceil(totalCards / 8) };
  }
}

function formatCardText(text, syllables) {
  // Si el texto es corto, mostrarlo normal
  if (text.length <= 8) return text;

  // Si tiene sílabas predefinidas, usarlas
  if (syllables && syllables !== text) {
    return syllables;
  }

  // Para textos largos sin sílabas, intentar separación automática
  return separateSyllables(text);
}

/* ============================================================
   RENDERIZAR TABLERO
   ============================================================ */
function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Calcular layout óptimo basado en cantidad de cartas
  const totalCards = state.cards.length;
  const { cols, rows } = calculateOptimalLayout(totalCards);

  // Aplicar grid layout dinámico
  board.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${rows}, 1fr)`;

  state.cards.forEach(card => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.id = card.id;
    div.setAttribute('role', 'button');
    div.setAttribute('aria-label', 'Carta boca abajo');
    div.setAttribute('tabindex', '0');

    let frontContent = '';
    if (card.type === 'image') {
      frontContent = `<img src="${card.imageUrl}" alt="${card.value}" draggable="false">`;
    } else {
      // Mejorar el manejo de texto largo
      const displayText = formatCardText(card.value, card.syllables);
      frontContent = `<span class="card-text">${displayText}</span>`;
    }

    div.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back"><i class="fas fa-star"></i></div>
        <div class="card-face card-front">${frontContent}</div>
      </div>
    `;

    div.addEventListener('click', () => onCardClick(card.id));
    div.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onCardClick(card.id); }
    });

    board.appendChild(div);
  });
}

/* ============================================================
   LÓGICA DE JUEGO
   ============================================================ */
function onCardClick(cardId) {
  if (state.locked) return;
  const card = state.cards.find(c => c.id === cardId);
  if (!card || card.matched || card.revealed) return;

  // Voltear carta
  card.revealed = true;
  const el = getCardElement(cardId);
  el.classList.add('flipped');
  el.setAttribute('aria-label', card.value);
  SFX.flip();
  speakWord(card.value);

  state.flippedCards.push(card);

  if (state.flippedCards.length === 2) {
    state.attempts++;
    state.locked = true;
    lockAllCards(true);
    updateHUD();

    const [c1, c2] = state.flippedCards;

    if (c1.pairId === c2.pairId && c1.id !== c2.id) {
      // ¡Coincidencia!
      setTimeout(() => handleMatch(c1, c2), 500);
    } else {
      // No coincide
      setTimeout(() => handleMismatch(c1, c2), 1000);
    }
  }
}

function handleMatch(c1, c2) {
  c1.matched = true;
  c2.matched = true;
  state.pairsFound++;
  state.streak++;
  if (state.streak > state.bestStreak) state.bestStreak = state.streak;

  // Puntaje: 100 base + 50 si es primer intento de la racha
  let pts = 100;
  if (state.firstAttempt) pts += 50;
  // Multiplicador por racha
  const multiplier = 1 + (state.streak - 1) * 0.25;
  pts = Math.round(pts * multiplier);
  state.score += pts;
  state.firstAttempt = true;

  const el1 = getCardElement(c1.id);
  const el2 = getCardElement(c2.id);
  el1.classList.add('matched');
  el2.classList.add('matched');

  SFX.match();
  showSyllableOverlay(c1.value, c1.syllables);
  updateHUD();

  state.flippedCards = [];
  state.locked = false;
  lockAllCards(false);

  // Verificar victoria
  if (state.pairsFound === state.totalPairs) {
    setTimeout(handleVictory, 1200);
  }
}

function handleMismatch(c1, c2) {
  state.errors++;
  state.streak = 0;
  state.firstAttempt = true;
  state.score = Math.max(0, state.score - 10);

  const el1 = getCardElement(c1.id);
  const el2 = getCardElement(c2.id);
  el1.classList.add('error');
  el2.classList.add('error');

  SFX.error();

  setTimeout(() => {
    c1.revealed = false;
    c2.revealed = false;
    el1.classList.remove('flipped', 'error');
    el2.classList.remove('flipped', 'error');
    el1.setAttribute('aria-label', 'Carta boca abajo');
    el2.setAttribute('aria-label', 'Carta boca abajo');

    state.flippedCards = [];
    state.locked = false;
    lockAllCards(false);
    updateHUD();
  }, 600);
}

function getCardElement(id) {
  return document.querySelector(`.card[data-id="${id}"]`);
}

function lockAllCards(locked) {
  document.querySelectorAll('.card').forEach(c => {
    if (locked) c.classList.add('locked');
    else c.classList.remove('locked');
  });
}

/* ============================================================
   OVERLAY DE SILABAS
   ============================================================ */
function showSyllableOverlay(word, syllables) {
  const overlay = document.getElementById('syllable-overlay');
  document.getElementById('syl-word').textContent = word;
  document.getElementById('syl-syllables').textContent = syllables;
  overlay.classList.add('show');
  setTimeout(() => overlay.classList.remove('show'), 1800);
}

/* ============================================================
   TEMPORIZADOR
   ============================================================ */
function startTimer() {
  state.timerStart = Date.now();
  state.elapsedSeconds = 0;
  state.timerInterval = setInterval(() => {
    state.elapsedSeconds = Math.floor((Date.now() - state.timerStart) / 1000);
    document.getElementById('hud-time').textContent = formatTime(state.elapsedSeconds);
  }, 500);
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
}

function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${sec.toString().padStart(2, '0')}`;
}

/* ============================================================
   HUD
   ============================================================ */
function updateHUD() {
  document.getElementById('hud-name').textContent = state.playerName;
  document.getElementById('hud-score').textContent = state.score;
  document.getElementById('hud-pairs').textContent = `${state.pairsFound}/${state.totalPairs}`;
  document.getElementById('hud-attempts').textContent = state.attempts;
  document.getElementById('hud-errors').textContent = state.errors;
  document.getElementById('hud-streak').textContent = state.streak;
}

/* ============================================================
   VICTORIA
   ============================================================ */
function handleVictory() {
  stopTimer();
  SFX.victory();

  // Calcular estrellas
  const accuracy = state.totalPairs / Math.max(1, state.attempts);
  let stars = 1;
  if (accuracy >= 0.7) stars = 3;
  else if (accuracy >= 0.4) stars = 2;

  // Mensaje motivacional
  const messages = {
    3: '¡EXCELENTE! SOS UN CRACK!',
    2: '¡MUY BIEN! SEGUÍ ASÍ!',
    1: '¡SEGUÍ PRACTICANDO!'
  };

  // Llenar pantalla fin
  document.getElementById('end-score').textContent = state.score;
  document.getElementById('end-time').textContent = formatTime(state.elapsedSeconds);
  document.getElementById('end-attempts').textContent = state.attempts;
  document.getElementById('end-errors').textContent = state.errors;
  document.getElementById('end-message').textContent = messages[stars];

  // Estrellas
  const starEls = document.querySelectorAll('#end-stars .fa-star');
  starEls.forEach((s, i) => {
    s.classList.toggle('earned', i < stars);
  });

  // Guardar ranking
  saveToRanking({
    name: state.playerName,
    score: state.score,
    difficulty: state.difficulty,
    pairs: state.totalPairs,
    time: state.elapsedSeconds,
    date: new Date().toLocaleDateString('es-AR')
  });

  showScreen('screen-end');
  startConfetti();
}

/* ============================================================
   CONFETTI
   ============================================================ */
let confettiParticles = [];
let confettiRunning = false;

function startConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#FF6B35','#00B894','#FDCB6E','#E74C3C','#FF9FF3','#54A0FF','#FFF'];

  confettiParticles = [];
  for (let i = 0; i < 180; i++) {
    confettiParticles.push({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 300,
      w: 5 + Math.random() * 9,
      h: 3 + Math.random() * 7,
      vx: (Math.random() - 0.5) * 5,
      vy: 2.5 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      rotV: (Math.random() - 0.5) * 12,
      opacity: 1
    });
  }

  confettiRunning = true;
  animateConfetti(ctx, canvas);
}

function animateConfetti(ctx, canvas) {
  if (!confettiRunning) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let alive = false;

  for (const p of confettiParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    p.vx *= 0.99;
    p.rot += p.rotV;
    if (p.y > canvas.height + 30) p.opacity -= 0.03;
    if (p.opacity <= 0) continue;
    alive = true;

    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot * Math.PI / 180);
    ctx.globalAlpha = Math.max(0, p.opacity);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    ctx.restore();
  }

  if (alive) requestAnimationFrame(() => animateConfetti(ctx, canvas));
  else { confettiRunning = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }
}

/* ============================================================
   RANKING (LOCALSTORAGE)
   ============================================================ */
function getRanking() {
  try { return JSON.parse(localStorage.getItem('memoria-ranking') || '[]'); }
  catch { return []; }
}

function saveToRanking(entry) {
  const ranking = getRanking();
  ranking.push(entry);
  ranking.sort((a, b) => b.score - a.score);
  ranking.splice(10);
  localStorage.setItem('memoria-ranking', JSON.stringify(ranking));
}

function renderRanking() {
  const list = document.getElementById('ranking-list');
  const ranking = getRanking();
  if (ranking.length === 0) {
    list.innerHTML = '<li class="ranking-empty">AÚN NO HAY REGISTROS</li>';
    return;
  }
  list.innerHTML = ranking.map((r, i) => `
    <li class="ranking-item">
      <div class="ranking-pos">${i + 1}</div>
      <div class="ranking-name">${r.name}</div>
      <div class="ranking-score">${r.score}</div>
      <div class="ranking-date">${r.date || ''}</div>
    </li>
  `).join('');
}

/* ============================================================
   INICIAR JUEGO
   ============================================================ */
function startGame(useCustom) {
  const name = document.getElementById('player-name').value.trim().toUpperCase();
  if (!name) { showToast('INGRESÁ TU NOMBRE', 'error'); document.getElementById('player-name').focus(); return; }

  const diff = DIFFICULTY_MAP[state.difficulty];
  let pairs;

  if (useCustom) {
    if (uploadedImages.length < diff.pairs) {
      showToast(`CARGÁ AL MENOS ${diff.pairs} IMÁGENES`, 'error');
      return;
    }
    // Seleccionar pares aleatorios
    const shuffled = [...uploadedImages].sort(() => Math.random() - 0.5);
    pairs = shuffled.slice(0, diff.pairs).map(img => ({
      name: img.name,
      imageUrl: img.imageUrl,
      syllables: separateSyllables(img.name)
    }));
  } else {
    // Para modo personalizado con emojis, usar la cantidad seleccionada
    const availablePairs = state.difficulty === 'custom' ? Math.min(diff.pairs, DEFAULT_PAIRS.length) : diff.pairs;
    const shuffled = [...DEFAULT_PAIRS].sort(() => Math.random() - 0.5);
    pairs = shuffled.slice(0, availablePairs).map(p => ({
      name: p.name,
      imageUrl: emojiImageCache[p.name],
      syllables: p.syllables
    }));
  }

  // Reiniciar estado
  state.playerName = name;
  state.pairs = pairs;
  state.totalPairs = pairs.length;
  state.cards = generateCards(pairs);
  state.flippedCards = [];
  state.score = 0;
  state.pairsFound = 0;
  state.attempts = 0;
  state.errors = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.firstAttempt = true;
  state.locked = false;
  state.useCustom = useCustom;

  renderBoard();
  updateHUD();
  showScreen('screen-game');
  startTimer();
}

/* ============================================================
   EVENT LISTENERS
   ============================================================ */
document.addEventListener('DOMContentLoaded', () => {
  createBackgroundShapes();

  // Dificultad
  document.querySelectorAll('.diff-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.difficulty = btn.dataset.diff;

      // Mostrar/ocultar selector personalizado
      const customSelector = document.getElementById('custom-pairs-selector');
      if (btn.dataset.diff === 'custom') {
        customSelector.style.display = 'block';
      } else {
        customSelector.style.display = 'none';
      }
    });
  });

  // Selector personalizado de parejas
  const customPairsInput = document.getElementById('custom-pairs-input');
  customPairsInput.addEventListener('input', (e) => {
    const value = parseInt(e.target.value);
    if (value >= 2 && value <= 30) {
      DIFFICULTY_MAP.custom.pairs = value;
      // Recalcular layout óptimo
      const totalCards = value * 2; // 2 cartas por pareja
      const layout = calculateOptimalLayout(totalCards);
      DIFFICULTY_MAP.custom.cols = layout.cols;
      DIFFICULTY_MAP.custom.rows = layout.rows;
    }
  });

  // Drop zone
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('click', () => fileInput.click());
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', () => {
    handleFiles(fileInput.files);
    fileInput.value = '';
  });

  // Botones de inicio
  document.getElementById('btn-start-custom').addEventListener('click', () => startGame(true));
  document.getElementById('btn-start-default').addEventListener('click', () => startGame(false));

  // Pantalla fin
  document.getElementById('btn-play-again').addEventListener('click', () => {
    confettiRunning = false;
    startGame(state.useCustom);
  });
  document.getElementById('btn-go-home').addEventListener('click', () => {
    confettiRunning = false;
    showScreen('screen-start');
  });

  // Ranking
  document.getElementById('btn-show-ranking').addEventListener('click', openRanking);
  document.getElementById('btn-show-ranking-end').addEventListener('click', openRanking);
  document.getElementById('btn-close-ranking').addEventListener('click', () => {
    document.getElementById('ranking-modal').classList.remove('show');
  });
  document.getElementById('ranking-modal').addEventListener('click', e => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('show');
  });

  // Mute
  document.getElementById('btn-mute').addEventListener('click', () => {
    state.muted = !state.muted;
    const btn = document.getElementById('btn-mute');
    btn.classList.toggle('muted', state.muted);
    btn.innerHTML = state.muted
      ? '<i class="fas fa-volume-xmark"></i>'
      : '<i class="fas fa-volume-high"></i>';
    if (state.muted) window.speechSynthesis?.cancel();
  });

  // Cerrar overlay silabas al hacer click
  document.getElementById('syllable-overlay').addEventListener('click', () => {
    document.getElementById('syllable-overlay').classList.remove('show');
  });

  // Enter en input nombre
  document.getElementById('player-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-start-default').focus();
  });

  // Resize confetti canvas
  window.addEventListener('resize', () => {
    const c = document.getElementById('confetti-canvas');
    if (confettiRunning) { c.width = window.innerWidth; c.height = window.innerHeight; }
  });
});

function openRanking() {
  renderRanking();
  document.getElementById('ranking-modal').classList.add('show');
}
</script>
